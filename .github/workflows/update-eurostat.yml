name: Aggiorna dati Eurostat

on:
  schedule:
    - cron: '0 6 * * 1'   # ogni lunedì alle 6:00 UTC
  workflow_dispatch: {}    # permette di lanciarlo anche a mano da GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scarica dati da Eurostat
        run: python scripts/fetch_eurostat.py

      - name: Commit se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/eurostat.json
          git diff --staged --quiet || git commit -m "Aggiorna dati Eurostat $(date -u +%Y-%m-%d)"
          git push
